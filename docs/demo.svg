<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="Data ISC — animated bar chart race of GDP by country, 1990 to 2100">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="usa"  x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="chn"  x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#dc2626"/><stop offset="1" stop-color="#f87171"/></linearGradient>
    <linearGradient id="ind"  x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#d97706"/><stop offset="1" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="jpn"  x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="deu"  x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#059669"/><stop offset="1" stop-color="#34d399"/></linearGradient>
  </defs>

  <!-- panel -->
  <rect x="0" y="0" width="820" height="470" rx="14" fill="url(#bgGrad)"/>
  <rect x="0.5" y="0.5" width="819" height="469" rx="13.5" fill="none" stroke="#1e293b"/>

  <!-- header -->
  <text x="28" y="44" fill="#f8fafc" font-size="22" font-weight="700">Data ISC</text>
  <text x="118" y="44" fill="#64748b" font-size="15" font-weight="500">— Bar Chart Race</text>
  <text x="28" y="66" fill="#475569" font-size="12.5">GDP · nominal USD · 100 countries · 1990–2100</text>

  <!-- year readout -->
  <g text-anchor="end" font-weight="800" font-size="40" fill="#f1f5f9">
    <text x="792" y="56" opacity="0">1990
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.22;0.27;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="792" y="56" opacity="0">2025
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.22;0.27;0.47;0.52;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="792" y="56" opacity="0">2060
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.47;0.52;0.72;0.77;1" dur="12s" repeatCount="indefinite"/></text>
    <text x="792" y="56" opacity="0">2100
      <animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.72;0.77;1" dur="12s" repeatCount="indefinite"/></text>
  </g>

  <!-- bars -->
  <!-- United States -->
  <g transform="translate(0,95)">
    <animateTransform attributeName="transform" type="translate" values="0 95;0 95;0 155;0 215;0 215;0 215" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="12s" repeatCount="indefinite"/>
    <text x="182" y="31" text-anchor="end" fill="#e2e8f0" font-size="14" font-weight="600">🇺🇸 United States</text>
    <rect x="192" y="6" height="34" rx="5" fill="url(#usa)" width="320">
      <animate attributeName="width" values="320;360;380;400;410;420" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="12s" repeatCount="indefinite"/></rect>
  </g>
  <!-- China -->
  <g transform="translate(0,275)">
    <animateTransform attributeName="transform" type="translate" values="0 275;0 155;0 95;0 95;0 95;0 95" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="12s" repeatCount="indefinite"/>
    <text x="182" y="31" text-anchor="end" fill="#e2e8f0" font-size="14" font-weight="600">🇨🇳 China</text>
    <rect x="192" y="6" height="34" rx="5" fill="url(#chn)" width="120">
      <animate attributeName="width" values="120;260;400;500;540;560" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="12s" repeatCount="indefinite"/></rect>
  </g>
  <!-- India -->
  <g transform="translate(0,335)">
    <animateTransform attributeName="transform" type="translate" values="0 335;0 335;0 275;0 155;0 155;0 155" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="12s" repeatCount="indefinite"/>
    <text x="182" y="31" text-anchor="end" fill="#e2e8f0" font-size="14" font-weight="600">🇮🇳 India</text>
    <rect x="192" y="6" height="34" rx="5" fill="url(#ind)" width="60">
      <animate attributeName="width" values="60;90;180;340;400;440" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="12s" repeatCount="indefinite"/></rect>
  </g>
  <!-- Japan -->
  <g transform="translate(0,155)">
    <animateTransform attributeName="transform" type="translate" values="0 155;0 215;0 215;0 275;0 275;0 275" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="12s" repeatCount="indefinite"/>
    <text x="182" y="31" text-anchor="end" fill="#e2e8f0" font-size="14" font-weight="600">🇯🇵 Japan</text>
    <rect x="192" y="6" height="34" rx="5" fill="url(#jpn)" width="240">
      <animate attributeName="width" values="240;250;250;240;235;230" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="12s" repeatCount="indefinite"/></rect>
  </g>
  <!-- Germany -->
  <g transform="translate(0,215)">
    <animateTransform attributeName="transform" type="translate" values="0 215;0 275;0 335;0 335;0 335;0 335" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="12s" repeatCount="indefinite"/>
    <text x="182" y="31" text-anchor="end" fill="#e2e8f0" font-size="14" font-weight="600">🇩🇪 Germany</text>
    <rect x="192" y="6" height="34" rx="5" fill="url(#deu)" width="200">
      <animate attributeName="width" values="200;190;170;150;140;130" keyTimes="0;0.2;0.4;0.6;0.8;1" dur="12s" repeatCount="indefinite"/></rect>
  </g>

  <!-- footer caption -->
  <text x="28" y="452" fill="#475569" font-size="12">Upload a CSV · project forward · run what-if scenarios · export the race</text>
  <text x="792" y="452" text-anchor="end" fill="#334155" font-size="11" font-style="italic">illustrative</text>
</svg>
